# prek configuration for vmenu
# https://prek.j178.dev/

# Built-in fast hooks (Rust-native, zero setup, offline capable)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
  { id = "detect-private-key" },
  { id = "check-case-conflict" },
]

# Local project hooks
[[repos]]
repo = "local"

[[repos.hooks]]
id = "swiftlint"
name = "swiftlint"
language = "system"
entry = "swiftlint lint --quiet"
files = '\.swift$'

[[repos.hooks]]
id = "swift-build"
name = "swift build"
language = "system"
entry = "swift build"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "conventional-commit"
name = "conventional commit"
language = "script"
entry = "scripts/check-conventional-commit.sh"
stages = ["commit-msg"]
always_run = true
