name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-15
    strategy:
      matrix:
        configuration: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c ${{ matrix.configuration }}

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

  release:
    name: Create Release
    needs: [lint, build, test]
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" vmenu/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" vmenu/Info.plist

      - name: Import code-signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Decode certificate
          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download and install Apple intermediate certificates for trust chain
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDCA.cer" -o "$RUNNER_TEMP/DeveloperIDCA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          security import "$RUNNER_TEMP/DeveloperIDCA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          # Import certificate
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Verify signing identity
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo ""
          echo "=== All codesigning identities (including invalid) ==="
          security find-identity -p codesigning
          echo ""
          echo "=== Valid codesigning identities ==="
          security find-identity -v -p codesigning

      - name: Build and sign .app bundle
        env:
          CODESIGN_IDENTITY: "Developer ID Application: Brian Shumate (${{ secrets.APPLE_TEAM_ID }})"
        run: ./build-app.sh release sign

      - name: Create DMG
        run: |
          mkdir -p dist/dmg-staging
          cp -R vmenu.app dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create -volname "vmenu" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Sign DMG
        env:
          CODESIGN_IDENTITY: "Developer ID Application: Brian Shumate (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" --timestamp \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Create zip archive
        run: |
          cd dist/dmg-staging
          zip -r "../vmenu-${{ steps.version.outputs.version }}-macos.zip" vmenu.app

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Notarize zip
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: vmenu ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg
            dist/vmenu-${{ steps.version.outputs.version }}-macos.zip
