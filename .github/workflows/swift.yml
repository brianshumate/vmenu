name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

      - name: Run tests
        run: swift test

  release:
    name: Create Release
    needs: [check]
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Import code-signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Decode certificate
          printf '%s' "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to search list (include system keychain for Apple Root CA)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Download and install Apple intermediate certificates for trust chain
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDCA.cer" -o "$RUNNER_TEMP/DeveloperIDCA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          security import "$RUNNER_TEMP/DeveloperIDCA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          # Import certificate and private key
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build and sign .app bundle
        env:
          CODESIGN_IDENTITY: "Developer ID Application: Brian Shumate (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          # Use SHA-1 hash if name-based lookup fails
          HASH=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -n "$HASH" ]; then
            echo "Found identity hash: $HASH"
            export CODESIGN_IDENTITY="$HASH"
          fi
          ./build-app.sh release sign

      - name: Verify code signatures
        run: |
          echo "=== Verifying app bundle signature ==="
          codesign --verify --deep --strict --verbose=2 vmenu.app

          echo ""
          echo "=== Helper binary details ==="
          codesign -dv --verbose=2 vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1

          echo ""
          echo "=== Main app details ==="
          codesign -dv --verbose=2 vmenu.app/Contents/MacOS/vmenu 2>&1

          echo ""
          echo "=== Checking identifiers ==="
          HELPER_ID=$(codesign -dv vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1 | grep 'Identifier=' | cut -d= -f2)
          MAIN_ID=$(codesign -dv vmenu.app/Contents/MacOS/vmenu 2>&1 | grep 'Identifier=' | cut -d= -f2)
          echo "Helper identifier: $HELPER_ID"
          echo "Main app identifier: $MAIN_ID"

          # Verify identifiers are correct
          if [ "$HELPER_ID" != "com.brianshumate.vmenu.helper" ]; then
            echo "ERROR: Helper identifier mismatch! Expected 'com.brianshumate.vmenu.helper', got '$HELPER_ID'"
            exit 1
          fi
          if [ "$MAIN_ID" != "com.brianshumate.vmenu" ]; then
            echo "ERROR: Main app identifier mismatch! Expected 'com.brianshumate.vmenu', got '$MAIN_ID'"
            exit 1
          fi
          echo "✓ All identifiers correct"

          echo ""
          echo "=== Checking entitlements ==="
          echo "Helper entitlements:"
          codesign -d --entitlements - vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1 | head -20

          echo ""
          echo "Main app entitlements:"
          codesign -d --entitlements - vmenu.app/Contents/MacOS/vmenu 2>&1 | head -20

          # Verify helper is NOT sandboxed (required for launchctl operations)
          HELPER_SANDBOX=$(codesign -d --entitlements - vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1 | grep -c "app-sandbox.*true" || true)
          if [ "$HELPER_SANDBOX" -gt 0 ]; then
            echo "ERROR: Helper should not be sandboxed!"
            exit 1
          fi
          echo "✓ Helper correctly not sandboxed"

          # Verify main app IS sandboxed
          MAIN_SANDBOX=$(codesign -d --entitlements - vmenu.app/Contents/MacOS/vmenu 2>&1 | grep -c "app-sandbox.*true" || true)
          if [ "$MAIN_SANDBOX" -eq 0 ]; then
            echo "ERROR: Main app should be sandboxed!"
            exit 1
          fi
          echo "✓ Main app correctly sandboxed"

          # Verify main app has mach-lookup entitlement for XPC communication
          MACH_LOOKUP=$(codesign -d --entitlements - vmenu.app/Contents/MacOS/vmenu 2>&1 | grep -c "mach-lookup.global-name" || true)
          if [ "$MACH_LOOKUP" -eq 0 ]; then
            echo "ERROR: Main app missing mach-lookup entitlement for XPC!"
            exit 1
          fi
          echo "✓ Main app has mach-lookup entitlement"

          echo ""
          echo "=== Checking launch constraints (required for macOS 26+) ==="
          HELPER_CONSTRAINTS=$(codesign -dv --verbose=4 vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1 | grep -c "Has Parent Launch Constraints" || true)
          if [ "$HELPER_CONSTRAINTS" -eq 0 ]; then
            echo "ERROR: Helper missing parent launch constraints! Will fail on macOS 26."
            exit 1
          fi
          echo "✓ Helper has parent launch constraints"

          echo ""
          echo "=== Checking Developer ID signature ==="
          TEAM_ID=$(codesign -dv vmenu.app/Contents/MacOS/com.brianshumate.vmenu.helper 2>&1 | grep 'TeamIdentifier=' | cut -d= -f2)
          if [ "$TEAM_ID" = "not set" ] || [ -z "$TEAM_ID" ]; then
            echo "ERROR: Helper not signed with Developer ID! Ad-hoc signed helpers fail on macOS 26."
            exit 1
          fi
          echo "✓ Helper signed with Team ID: $TEAM_ID"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg-staging
          cp -R vmenu.app dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create -volname "vmenu" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Sign DMG
        run: |
          HASH=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          IDENTITY="${HASH:-Developer ID Application: Brian Shumate (${{ secrets.APPLE_TEAM_ID }})}"
          codesign --force --sign "$IDENTITY" --timestamp \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Create zip archive
        run: |
          cd dist/dmg-staging
          zip -r "../vmenu-${{ steps.version.outputs.version }}-macos.zip" vmenu.app

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Notarize zip
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: vmenu ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg
            dist/vmenu-${{ steps.version.outputs.version }}-macos.zip
