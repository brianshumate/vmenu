name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-15
    strategy:
      matrix:
        configuration: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c ${{ matrix.configuration }}

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

  release:
    name: Create Release
    needs: [lint, build, test]
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | sed -n 's/^release: *v\?\(.*\)/\1/p')
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Stamp version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" vmenu/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" vmenu/Info.plist

      - name: Build .app bundle
        run: ./build-app.sh release

      - name: Create DMG
        run: |
          mkdir -p dist/dmg-staging
          cp -R vmenu.app dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create -volname "vmenu" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Create zip archive
        run: |
          cd dist/dmg-staging
          zip -r "../vmenu-${{ steps.version.outputs.version }}-macos.zip" vmenu.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: vmenu ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/vmenu-${{ steps.version.outputs.version }}-macos.dmg
            dist/vmenu-${{ steps.version.outputs.version }}-macos.zip
