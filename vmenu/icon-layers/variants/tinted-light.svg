<?xml version="1.0" encoding="UTF-8"?>
<!-- TINTED LIGHT variant — most subdued appearance, system applies user tint color.
     Medium gray background. Near-monochrome green. Triangle at low opacity.
     Avoid fine details that may be lost under tint. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E7280"/>
      <stop offset="100%" stop-color="#5A5E6A"/>
    </linearGradient>
    <radialGradient id="cg" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#4A5260" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#383E4E" stop-opacity="0.45"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="420" r="190" fill="url(#cg)"/>
  <polygon points="173,200 850,200 512,850"
    fill="none" stroke="#FFFFFF" stroke-opacity="0.50" stroke-width="28" stroke-linejoin="round"/>
  <circle cx="512" cy="402" r="71" fill="#8A9E88"/>
</svg>
